name: Build Custom RustDesk (Windows Only)

# 仅手动触发，避免误编译
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: 拉取源码（兼容新版分支）
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 关键：拉取源码的子模块，新版必须加

      - name: 智能替换内网IP和Key（适配新版配置路径）
        run: |
          # 新版 RustDesk 配置文件路径为 libs/common/src/lib.rs
          $configPath = "libs/common/src/lib.rs"
          if (Test-Path $configPath) {
            (Get-Content $configPath -Encoding UTF8) `
            -replace 'pub const API_SERVER: &str = "https://api.rustdesk.com";', 'pub const API_SERVER: &str = "http://172.17.1.150:21114";' `
            -replace 'pub const RELAY_SERVER: &str = "rs.rustdesk.com:21116";', 'pub const RELAY_SERVER: &str = "172.17.1.150:21116";' `
            -replace 'pub const KEY: &str = "";', 'pub const KEY: &str = "ff9LJBs3smFIe2bA74QCdu+zfhFlhjvvRUqUKpX8+hY=";' `
            | Set-Content $configPath -Encoding UTF8
            Write-Host "✅ 成功替换配置文件：$configPath"
          } else {
            # 兼容旧版路径
            $oldConfigPath = "src/common.rs"
            if (Test-Path $oldConfigPath) {
              (Get-Content $oldConfigPath -Encoding UTF8) `
              -replace 'pub const API_SERVER: &str = "https://api.rustdesk.com";', 'pub const API_SERVER: &str = "http://172.17.1.150:21114";' `
              -replace 'pub const RELAY_SERVER: &str = "rs.rustdesk.com:21116";', 'pub const RELAY_SERVER: &str = "172.17.1.150:21116";' `
              -replace 'pub const KEY: &str = "";', 'pub const KEY: &str = "ff9LJBs3smFIe2bA74QCdu+zfhFlhjvvRUqUKpX8+hY=";' `
              | Set-Content $oldConfigPath -Encoding UTF8
              Write-Host "✅ 成功替换旧版配置文件：$oldConfigPath"
            } else {
              Write-Error "❌ 未找到配置文件，编译终止"
              exit 1
            }
          }

      - name: 安装 Rust 环境（指定稳定版）
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: 安装 Windows 编译依赖（解决链接器问题）
        run: |
          rustup component add msvc-tools
          cargo install cargo-wix --force  # 用于打包 MSI

      - name: 编译 Windows 定制版（Cargo 自动下载依赖）
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          # 加速依赖下载
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

      - name: 打包为 MSI 安装包（客户易安装）
        run: cargo wix --release --target x86_64-pc-windows-msvc

      - name: 上传编译产物（便携版 + 安装包）
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Windows
          path: |
            target/x86_64-pc-windows-msvc/release/rustdesk.exe
            target/x86_64-pc-windows-msvc/release/wix/*.msi

      - name: 自动创建 Release（方便下载）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-windows-latest
          name: 定制版 RustDesk (Windows) - 内置172.17.1.150
          files: |
            target/x86_64-pc-windows-msvc/release/rustdesk.exe
            target/x86_64-pc-windows-msvc/release/wix/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
