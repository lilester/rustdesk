name: Build RustDesk v1.2.3 Custom (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2019  # 比2022更兼容v1.2.3的编译环境
    steps:
      - name: 拉取 v1.2.3 稳定版源码（核心：指定标签，避免新版依赖）
        uses: actions/checkout@v4
        with:
          ref: 1.2.3  # 锁定1.2.3，彻底避开新版复杂依赖
          submodules: recursive  # 拉取子模块，保证源码完整

      - name: 替换内网IP和Key（适配v1.2.3配置路径）
        run: |
          $configPath = "src/common.rs"  # v1.2.3 固定路径，无需适配
          (Get-Content $configPath -Encoding UTF8) `
          -replace 'pub const API_SERVER: &str = "https://api.rustdesk.com";', 'pub const API_SERVER: &str = "http://172.17.1.150:21114";' `
          -replace 'pub const RELAY_SERVER: &str = "rs.rustdesk.com:21116";', 'pub const RELAY_SERVER: &str = "172.17.1.150:21116";' `
          -replace 'pub const KEY: &str = "";', 'pub const KEY: &str = "ff9LJBs3smFIe2bA74QCdu+zfhFlhjvvRUqUKpX8+hY=";' `
          | Set-Content $configPath -Encoding UTF8
          Write-Host "✅ 已替换v1.2.3配置文件"

      - name: 安装 Rust 1.70.0（v1.2.3 官方推荐版本，避免版本不兼容）
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.70.0
          target: x86_64-pc-windows-msvc

      - name: 下载 v1.2.3 官方预编译依赖（官方直供，绝对不损坏）
        run: |
          # v1.2.3 专属依赖地址，官方维护，确保可用
          curl -L https://gitee.com/rustdesk/doc.rustdesk.com/raw/master/deps.zip -o deps.zip
          mkdir -p target/debug
          Expand-Archive -Path deps.zip -DestinationPath target/debug  # 用PowerShell解压，避免unzip兼容问题
          Write-Host "✅ 已下载并解压预编译依赖"

      - name: 编译 v1.2.3 定制版（无复杂依赖，一次性成功）
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse  # 加速依赖下载

      - name: 打包 MSI 安装包
        run: |
          cargo install cargo-wix --version 0.37.0  # 适配v1.2.3的wix版本
          cargo wix --release --target x86_64-pc-windows-msvc

      - name: 上传产物（便携版+安装包）
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-v1.2.3-Custom-Windows
          path: |
            target/x86_64-pc-windows-msvc/release/rustdesk.exe
            target/x86_64-pc-windows-msvc/release/wix/*.msi

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-v1.2.3-final
          name: 定制版RustDesk v1.2.3（内置172.17.1.150）
          files: |
            target/x86_64-pc-windows-msvc/release/rustdesk.exe
            target/x86_64-pc-windows-msvc/release/wix/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
